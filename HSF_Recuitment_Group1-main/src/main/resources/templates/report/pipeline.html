<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('Pipeline Report', ~{::section})}">
<body>
<section>
  <h1 class="mb-3">Pipeline Report</h1>

  <div th:if="${jobs.isEmpty()}" class="text-muted">There are no job postings to report on yet.</div>

  <form method="get" class="app-card mb-3" th:unless="${jobs.isEmpty()}" style="max-width: 520px;">
    <label class="app-form-label">Select job posting</label>
    <div class="d-flex gap-2">
      <select name="jobId" class="app-form-control" onchange="this.form.submit()">
        <option th:each="j : ${jobs}" th:value="${j.id}" th:text="${j.title}" th:selected="${selected != null and selected.id == j.id}"></option>
      </select>
      <button class="app-btn app-btn-secondary">View</button>
    </div>
  </form>

  <div th:if="${selected != null}">
    <div th:if="${applicationCount == 0}" class="app-alert app-alert-warning">
      <i class="fa-solid fa-circle-info" style="font-size:20px;"></i>
      <span>No applications have been received for this job posting yet.</span>
    </div>

    <div th:if="${applicationCount > 0}" class="row g-3">
      <div class="col-lg-5">
        <div class="app-card">
          <h3 class="app-card-title mb-3">Stage Breakdown</h3>
          <div th:each="entry : ${pipeline}" class="mb-2">
            <div class="d-flex justify-content-between small"><span th:text="${entry.key}">Stage</span><span th:text="${entry.value}">0</span></div>
            <div class="progress" style="height: 10px;">
              <div class="progress-bar" th:style="'width:' + ${applicationCount > 0 ? (entry.value * 100 / applicationCount) : 0} + '%'"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="app-card">
          <h3 class="app-card-title mb-3">Candidates</h3>
          <div class="app-table-wrapper">
            <table class="app-table">
              <thead><tr><th>Candidate</th><th>Stage</th><th>Days</th><th>Interviewer</th></tr></thead>
              <tbody>
                <tr th:each="app : ${applications}">
                  <td th:text="${app.candidate != null and app.candidate.user != null ? app.candidate.user.fullName : '—'}">Name</td>
                  <td><span class="app-badge app-badge-info" th:text="${app.status}">STATUS</span></td>
                  <td th:text="${app.submissionDate != null ? T(java.time.temporal.ChronoUnit).DAYS.between(app.submissionDate.toLocalDate(), T(java.time.LocalDate).now()) : ''}">0</td>
                  <td th:text="${!app.interviews.isEmpty() and app.interviews[0].interviewer != null ? app.interviews[0].interviewer.fullName : '—'}">—</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
