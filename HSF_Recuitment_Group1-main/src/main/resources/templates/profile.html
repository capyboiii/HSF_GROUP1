<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('Profile', ~{::section})}">
<body>
<section>
  <h1 class="mb-4">User Profile</h1>
  <div class="app-card" style="max-width: 640px;">
    <div class="mb-3">
      <label class="app-form-label text-muted">Full name</label>
      <div class="fw-semibold" th:text="${currentUser.fullName}">Name</div>
    </div>
    <div class="mb-3">
      <label class="app-form-label text-muted">Username</label>
      <div class="fw-semibold" th:text="${currentUser.username}">username</div>
      <small class="text-muted">Username cannot be changed.</small>
    </div>
    <div class="mb-3">
      <label class="app-form-label text-muted">Email</label>
      <div class="fw-semibold" th:text="${currentUser.email}">email</div>
    </div>
    <div class="mb-4">
      <label class="app-form-label text-muted">Role</label>
      <div><span class="app-badge app-badge-info" th:text="${currentUser.roleLabel()}">Role</span></div>
    </div>
    <div class="d-flex gap-2 border-top pt-3">
      <a th:href="@{/change-password}" class="app-btn app-btn-secondary"><i class="fa-solid fa-key me-1"></i>Change Password</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="app-btn app-btn-danger"><i class="fa-solid fa-right-from-bracket me-1"></i>Sign Out</button>
      </form>
    </div>
  </div>
</section>
</body>
</html>
