<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your account - TalentHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/dark.css}" rel="stylesheet">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body class="bg-light">
<button type="button" class="theme-toggle position-fixed top-0 end-0 m-3" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
  <i class="bi bi-moon-stars" data-theme-icon></i>
</button>
<div class="container" style="max-width: 480px;">
  <div class="text-center my-4"><h2 class="fw-bold"><i class="bi bi-hub me-2"></i>TalentHub</h2></div>
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-4 text-center">Create your account</h1>
      <form th:action="@{/register}" method="post">
        <div class="mb-3">
          <label class="form-label">Full name</label>
          <input type="text" name="fullName" class="form-control" th:value="${fullName}" required>
          <div class="text-danger small" th:if="${errors != null and errors.fullName}" th:text="${errors.fullName}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" th:value="${username}" required>
          <div class="form-text">4–50 characters. Letters, digits, and underscores only.</div>
          <div class="text-danger small" th:if="${errors != null and errors.username}" th:text="${errors.username}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" th:value="${email}" required>
          <div class="text-danger small" th:if="${errors != null and errors.email}" th:text="${errors.email}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
          <div class="form-text">At least 8 characters, including 1 uppercase letter and 1 number.</div>
          <div class="text-danger small" th:if="${errors != null and errors.password}" th:text="${errors.password}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirmPassword" class="form-control" required>
          <div class="text-danger small" th:if="${errors != null and errors.confirmPassword}" th:text="${errors.confirmPassword}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account</button>
      </form>
      <hr>
      <div class="text-center">
        <span class="text-muted">Already have an account?</span>
        <a th:href="@{/login}">Sign in</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
