<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login - TalentHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/editorial.css}" rel="stylesheet">
  <link th:href="@{/css/base/dark.css}" rel="stylesheet">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body class="bg-light">
<button type="button" class="theme-toggle position-fixed top-0 end-0 m-3" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
  <i class="fa-solid fa-moon" data-theme-icon></i>
</button>
<div class="container" style="max-width: 440px;">
  <div class="text-center my-4">
    <h2 class="fw-bold"><i class="fa-solid fa-building me-2"></i>TalentHub</h2>
  </div>
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-4 text-center">User Login to TalentHub</h1>

      <div th:if="${flash}" class="alert alert-success py-2" th:text="${flash}"></div>
      <div th:if="${error}" class="alert alert-danger py-2" role="alert" th:text="${error}"></div>
      <div th:if="${lockout}" class="alert alert-warning py-2" role="alert">
        Your account has been temporarily locked after too many failed attempts.
        Try again in 10 minutes or contact your administrator.
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Username or email</label>
          <input type="text" name="usernameOrEmail" class="form-control" th:value="${usernameOrEmail}" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="password" class="form-control" required>
            <button class="btn btn-quiet" type="button" onclick="togglePw()"><i class="fa-solid fa-eye" id="pwIcon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-charcoal w-100">User Login</button>
      </form>

      <div class="text-center mt-3">
        <a th:href="@{/reset-password}">Forgot password?</a>
      </div>
      <hr>
      <div class="text-center">
        <span class="text-muted">New candidate?</span>
        <a th:href="@{/register}">Create an account</a>
      </div>
    </div>
  </div>
  <p class="text-center text-muted mt-3"><a th:href="@{/jobs}">Browse open positions &rarr;</a></p>
</div>
<script>
  function togglePw() {
    var p = document.getElementById('password'), i = document.getElementById('pwIcon');
    if (p.type === 'password') { p.type = 'text'; i.className = 'fa-solid fa-eye-slash'; }
    else { p.type = 'password'; i.className = 'fa-solid fa-eye'; }
  }
</script>
</body>
</html>
