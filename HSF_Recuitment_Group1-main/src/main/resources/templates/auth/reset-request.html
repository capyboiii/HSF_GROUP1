<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password - TalentHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/editorial.css}" rel="stylesheet">
  <link th:href="@{/css/base/dark.css}" rel="stylesheet">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body class="bg-light">
<button type="button" class="theme-toggle position-fixed top-0 end-0 m-3" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
  <i class="fa-solid fa-moon" data-theme-icon></i>
</button>
<div class="container" style="max-width: 440px;">
  <div class="text-center my-4"><h2 class="fw-bold"><i class="fa-solid fa-building me-2"></i>TalentHub</h2></div>
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-3 text-center">Reset your password</h1>
      <div th:if="${submitted}" class="alert alert-success py-2" role="alert">
        If an account with this email exists, a reset link has been sent.
      </div>
      <p class="text-muted" th:unless="${submitted}">Enter your email address and we will send you a link to reset your password.</p>
      <form th:action="@{/reset-password}" method="post" th:unless="${submitted}">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-charcoal w-100">Send Reset Link</button>
      </form>
      <div class="text-center mt-3"><a th:href="@{/login}">Back to Sign In</a></div>
    </div>
  </div>
</div>
</body>
</html>
