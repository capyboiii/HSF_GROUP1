<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set your new password - TalentHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/dark.css}" rel="stylesheet">
  <script th:src="@{/js/theme.js}"></script>
</head>
<body class="bg-light">
<button type="button" class="theme-toggle position-fixed top-0 end-0 m-3" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
  <i class="bi bi-moon-stars" data-theme-icon></i>
</button>
<div class="container" style="max-width: 440px;">
  <div class="text-center my-4"><h2 class="fw-bold"><i class="bi bi-hub me-2"></i>TalentHub</h2></div>
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-3 text-center">Set your new password</h1>

      <div th:if="${invalidToken}" class="alert alert-danger py-2" role="alert">
        This link has expired or has already been used.
        <a th:href="@{/reset-password}">Request a new reset link.</a>
      </div>

      <form th:action="@{/reset-password/confirm}" method="post" th:unless="${invalidToken}">
        <div class="mb-3">
          <label class="form-label">New password</label>
          <input type="password" name="newPassword" class="form-control" required>
          <div class="form-text">At least 8 characters, including 1 uppercase letter and 1 number.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm new password</label>
          <input type="password" name="confirmPassword" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Set Password</button>
      </form>
      <div class="text-center mt-3"><a th:href="@{/login}">Back to Sign In</a></div>
    </div>
  </div>
</div>
</body>
</html>
