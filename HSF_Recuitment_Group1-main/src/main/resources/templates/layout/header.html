<div th:fragment="header" class="app-navbar">
  <!-- Brand logo/text on left -->
  <a th:href="@{/}" class="app-navbar-brand">TalentHub</a>
  
  <!-- Right side notifications/profile dropdown actions -->
  <div class="d-flex align-items-center gap-3">
    <!-- Notifications bell -->
    <div class="dropdown">
      <button class="btn btn-link text-decoration-none text-muted p-1" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-bell" style="font-size: 20px;"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end p-2" style="min-width: 240px;">
        <li class="dropdown-header text-uppercase fw-bold text-primary">Notifications</li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <a class="dropdown-item py-2" href="#">
            <div class="fw-semibold text-dark" style="font-size: 13px;">New Applicant</div>
            <small class="text-muted" style="font-size: 11px;">Nguyen Van A applied for Java Dev</small>
          </a>
        </li>
      </ul>
    </div>
    
    <!-- Profile dropdown -->
    <div class="dropdown">
      <button class="btn btn-link text-decoration-none text-muted p-1 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-person-circle" style="font-size: 20px;"></i>
        <span class="d-none d-md-inline" style="font-size: 14px;">HR Manager</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
        <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <form th:action="@{/logout}" method="post" class="w-100">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
            <button type="submit" class="dropdown-item text-danger w-100"><i class="bi bi-box-arrow-right me-2"></i>Log Out</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</div>
