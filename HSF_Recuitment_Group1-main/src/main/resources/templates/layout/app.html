<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="appLayout(title, content)">
<head>
  <!-- Anti-flash: apply saved theme before first paint (ui-skill.md §10) -->
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title != null ? title + ' - TalentHub' : 'TalentHub'}">TalentHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 webfont — fa-solid weight only (ui-skill.md §5) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/reset.css}" rel="stylesheet">
  <link th:href="@{/css/layout/navbar.css}" rel="stylesheet">
  <link th:href="@{/css/layout/sidebar.css}" rel="stylesheet">
  <link th:href="@{/css/layout/footer.css}" rel="stylesheet">
  <link th:href="@{/css/components/button.css}" rel="stylesheet">
  <link th:href="@{/css/components/form.css}" rel="stylesheet">
  <link th:href="@{/css/components/table.css}" rel="stylesheet">
  <link th:href="@{/css/components/card.css}" rel="stylesheet">
  <link th:href="@{/css/components/badge.css}" rel="stylesheet">
  <link th:href="@{/css/components/modal.css}" rel="stylesheet">
  <link th:href="@{/css/components/alert.css}" rel="stylesheet">
  <!-- Editorial minimalism skin (ui-skill.md) — before dark.css so §10 still wins in dark -->
  <link th:href="@{/css/base/editorial.css}" rel="stylesheet">
  <link th:href="@{/css/base/dark.css}" rel="stylesheet">
  <script th:src="@{/js/theme.js}"></script>
  <style>
    .app-main-frame { min-height: 100dvh; display: flex; flex-direction: column; }
    .app-viewport-content { padding: var(--content-padding, 24px); flex: 1; }
    @media (min-width: 768px) { .app-main-frame { margin-left: var(--sidebar-width, 240px); } }
    .app-main-frame.no-sidebar { margin-left: 0; }
    .app-sidebar-link.active { font-weight: 600; }
  </style>
</head>
<body>

  <!-- Role-aware sidebar (hidden for guests — no menu to show) -->
  <div class="app-sidebar" th:if="${currentUser != null}">
    <div class="app-sidebar-logo">
      <i class="fa-solid fa-building me-2"></i><span>TalentHub</span>
    </div>
    <ul class="app-sidebar-menu" th:if="${currentUser != null}">
      <!-- Admin -->
      <li th:if="${currentUser.admin}"><a th:href="@{/admin}" class="app-sidebar-link"><i class="fa-solid fa-table-cells-large fa-fw"></i><span>Dashboard</span></a></li>
      <li th:if="${currentUser.admin}"><a th:href="@{/admin/users}" class="app-sidebar-link"><i class="fa-solid fa-users fa-fw"></i><span>Users</span></a></li>
      <li th:if="${currentUser.admin}"><a th:href="@{/admin/activity-log}" class="app-sidebar-link"><i class="fa-solid fa-clock-rotate-left fa-fw"></i><span>Activity Log</span></a></li>
      <!-- HR (and Admin, who inherits HR) -->
      <li th:if="${currentUser.hr}"><a th:href="@{/dashboard}" class="app-sidebar-link"><i class="fa-solid fa-table-cells-large fa-fw"></i><span>Dashboard</span></a></li>
      <li th:if="${currentUser.hrOrAdmin}"><a th:href="@{/manage/jobs}" class="app-sidebar-link"><i class="fa-solid fa-briefcase fa-fw"></i><span>Jobs</span></a></li>
      <li th:if="${currentUser.hrOrAdmin}"><a th:href="@{/reports}" class="app-sidebar-link"><i class="fa-solid fa-chart-column fa-fw"></i><span>Reports</span></a></li>
      <!-- Interviewer -->
      <li th:if="${currentUser.interviewer}"><a th:href="@{/interviewer}" class="app-sidebar-link"><i class="fa-solid fa-clipboard-list fa-fw"></i><span>My Interviews</span></a></li>
      <!-- Candidate -->
      <li th:if="${currentUser.candidate}"><a th:href="@{/jobs}" class="app-sidebar-link"><i class="fa-solid fa-magnifying-glass fa-fw"></i><span>Browse Jobs</span></a></li>
      <li th:if="${currentUser.candidate}"><a th:href="@{/my-applications}" class="app-sidebar-link"><i class="fa-solid fa-id-card fa-fw"></i><span>My Applications</span></a></li>
      <!-- All -->
      <li><a th:href="@{/profile}" class="app-sidebar-link"><i class="fa-solid fa-user fa-fw"></i><span>Profile</span></a></li>
    </ul>
  </div>

  <div class="app-main-frame" th:classappend="${currentUser == null} ? ' no-sidebar' : ''">
    <!-- Header -->
    <div class="app-navbar">
      <a th:href="@{/}" class="app-navbar-brand">TalentHub</a>
      <div class="d-flex align-items-center gap-3">
        <button type="button" class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon" data-theme-icon></i>
        </button>
        <span th:if="${currentUser != null}" class="app-badge app-badge-info" th:text="${currentUser.roleLabel()}">Role</span>
        <a th:if="${currentUser == null}" th:href="@{/login}" class="app-btn app-btn-outline btn-sm">Sign In</a>
        <div class="dropdown" th:if="${currentUser != null}">
          <button class="btn btn-link text-decoration-none text-muted p-1 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
            <i class="fa-solid fa-circle-user" style="font-size: 20px;"></i>
            <span class="d-none d-md-inline" style="font-size: 14px;" th:text="${currentUser.fullName}">User</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" th:href="@{/profile}"><i class="fa-solid fa-user fa-fw me-2"></i>Profile</a></li>
            <li><a class="dropdown-item" th:href="@{/change-password}"><i class="fa-solid fa-key fa-fw me-2"></i>Change Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/logout}" method="post" class="w-100">
                <button type="submit" class="dropdown-item text-danger w-100"><i class="fa-solid fa-right-from-bracket fa-fw me-2"></i>Sign Out</button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <main class="app-viewport-content">
      <!-- Flash / error banners -->
      <div th:if="${flash}" class="app-alert app-alert-success" role="alert">
        <i class="fa-solid fa-circle-check" style="font-size:20px;"></i><span th:text="${flash}"></span>
      </div>
      <div th:if="${error}" class="app-alert app-alert-danger" role="alert">
        <i class="fa-solid fa-triangle-exclamation" style="font-size:20px;"></i><span th:text="${error}"></span>
      </div>

      <div th:replace="${content}"></div>
    </main>

    <div class="app-footer"><div class="container-fluid"><div>&copy; 2026 TalentHub Inc.</div></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
