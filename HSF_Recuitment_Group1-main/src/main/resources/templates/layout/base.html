<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="mainLayout(title, content)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title != null ? title + ' - TalentHub' : 'TalentHub'}">TalentHub</title>
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Design Tokens -->
  <link th:href="@{/css/base/variables.css}" rel="stylesheet">
  <link th:href="@{/css/base/reset.css}" rel="stylesheet">
  
  <!-- Layout Styles -->
  <link th:href="@{/css/layout/navbar.css}" rel="stylesheet">
  <link th:href="@{/css/layout/sidebar.css}" rel="stylesheet">
  <link th:href="@{/css/layout/footer.css}" rel="stylesheet">
  
  <!-- Component Styles -->
  <link th:href="@{/css/components/button.css}" rel="stylesheet">
  <link th:href="@{/css/components/form.css}" rel="stylesheet">
  <link th:href="@{/css/components/table.css}" rel="stylesheet">
  <link th:href="@{/css/components/card.css}" rel="stylesheet">
  <link th:href="@{/css/components/badge.css}" rel="stylesheet">
  <link th:href="@{/css/components/modal.css}" rel="stylesheet">
  <link th:href="@{/css/components/alert.css}" rel="stylesheet">
  
  <style>
    /* Responsive structural frame layout */
    .app-main-frame {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .app-viewport-content {
      padding: var(--content-padding);
      flex: 1;
    }
    
    @media (min-width: 768px) {
      .app-main-frame {
        margin-left: var(--sidebar-width);
      }
    }
  </style>
</head>
<body>
  
  <!-- Sidebar Navigation -->
  <div th:replace="~{layout/sidebar :: sidebar}"></div>

  <!-- Viewport Main Frame Container -->
  <div class="app-main-frame">
    <!-- Navbar Header -->
    <div th:replace="~{layout/header :: header}"></div>
    
    <!-- Dynamic Page Content -->
    <main class="app-viewport-content">
      <div th:replace="${content}"></div>
    </main>
    
    <!-- Footer -->
    <div th:replace="~{layout/footer :: footer}"></div>
  </div>

  <!-- Bootstrap 5.3 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
