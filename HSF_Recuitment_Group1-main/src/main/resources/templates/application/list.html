<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('Applications', ~{::section})}">
<body>
<section>
  <nav class="mb-2"><a th:href="@{'/manage/jobs/' + ${job.id}}">&larr; Job Detail</a></nav>
  <h2 class="mb-1">
    <span th:text="${job.title}">Job</span>
    <span class="app-badge app-badge-secondary ms-2" th:text="${job.status}">STATUS</span>
  </h2>
  <p class="text-muted">Applications for this job posting.</p>

  <!-- Stage tabs -->
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <a class="nav-link" th:classappend="${activeStage == 'ALL'} ? ' active fw-semibold' : ''"
         th:href="@{'/manage/jobs/' + ${job.id} + '/applications'(stage='ALL')}">
        All <span class="badge bg-secondary" th:text="${stageCounts.get('ALL')}">0</span>
      </a>
    </li>
    <li class="nav-item" th:each="s : ${stages}">
      <a class="nav-link" th:classappend="${activeStage == s.name()} ? ' active fw-semibold' : ''"
         th:href="@{'/manage/jobs/' + ${job.id} + '/applications'(stage=${s.name()})}">
        <span th:text="${#strings.capitalize(#strings.toLowerCase(s.name()))}">Stage</span>
        <span class="badge bg-secondary" th:text="${stageCounts.get(s.name())}">0</span>
      </a>
    </li>
  </ul>

  <div class="app-card">
    <div th:if="${applications.isEmpty()}" class="text-muted py-3">No candidates at this stage yet.</div>
    <div class="app-table-wrapper" th:unless="${applications.isEmpty()}">
      <table class="app-table">
        <thead><tr><th>Candidate</th><th>Submitted</th><th>Days</th><th>Status</th><th></th></tr></thead>
        <tbody>
          <tr th:each="app : ${applications}">
            <td class="fw-semibold" th:text="${app.candidate != null and app.candidate.user != null ? app.candidate.user.fullName : '—'}">Name</td>
            <td th:text="${app.submissionDate != null ? #temporals.format(app.submissionDate, 'yyyy-MM-dd') : '—'}">date</td>
            <td th:text="${app.submissionDate != null ? T(java.time.temporal.ChronoUnit).DAYS.between(app.submissionDate.toLocalDate(), T(java.time.LocalDate).now()) : ''}">0</td>
            <td><span class="app-badge app-badge-info" th:text="${app.status}">STATUS</span></td>
            <td><a th:href="@{'/applications/' + ${app.id}}" class="app-btn app-btn-outline btn-sm">Open</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
</body>
</html>
