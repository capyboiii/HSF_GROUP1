<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('Activity Log', ~{::section})}">
<body>
<section>
  <h1 class="mb-4">Activity Log</h1>

  <form method="get" class="app-card mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="app-form-label">Event type</label>
        <select name="eventType" class="app-form-control">
          <option value="">All</option>
          <option th:each="et : ${eventTypes}" th:value="${et}" th:text="${et}" th:selected="${eventType == et.name()}"></option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="app-form-label">Actor</label>
        <input name="actor" class="app-form-control" th:value="${actor}" placeholder="Name or username">
      </div>
      <div class="col-md-2">
        <label class="app-form-label">From</label>
        <input name="from" type="date" class="app-form-control" th:value="${from}">
      </div>
      <div class="col-md-2">
        <label class="app-form-label">To</label>
        <input name="to" type="date" class="app-form-control" th:value="${to}">
      </div>
      <div class="col-md-2"><button class="app-btn app-btn-secondary w-100">Filter</button></div>
    </div>
  </form>

  <div class="app-card">
    <div th:if="${logs.isEmpty()}" class="text-muted py-3">No activity records match your current filters.</div>
    <div class="app-table-wrapper" th:unless="${logs.isEmpty()}">
      <table class="app-table">
        <thead><tr><th>Timestamp</th><th>Actor</th><th>Event type</th><th>Description</th><th>IP address</th></tr></thead>
        <tbody>
          <tr th:each="log : ${logs}">
            <td th:text="${log.timestamp != null ? #temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm') : ''}">time</td>
            <td th:text="${log.user != null ? log.user.username : '—'}">actor</td>
            <td><span class="app-badge app-badge-info" th:text="${log.eventType}">EVENT</span></td>
            <td th:text="${log.description}">desc</td>
            <td th:text="${log.ipAddress != null ? log.ipAddress : '—'}">ip</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
</body>
</html>
