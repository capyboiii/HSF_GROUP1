<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('User Management', ~{::section})}">
<body>
<section>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">User Management</h1>
    <button class="app-btn app-btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#createForm">
      <i class="ph-bold ph-plus me-1"></i>Create Account
    </button>
  </div>

  <!-- Create staff form -->
  <div class="collapse mb-4" id="createForm" th:classappend="${openCreate} ? ' show' : ''">
    <div class="app-card">
      <h3 class="app-card-title mb-3">Create HR Manager / Interviewer</h3>
      <form th:action="@{/admin/users}" method="post" class="row g-3">
        <div class="col-md-6">
          <label class="app-form-label">Full name</label>
          <input name="fullName" class="app-form-control" th:value="${fullName}" required>
          <div class="text-danger small" th:if="${createErrors != null and createErrors.fullName}" th:text="${createErrors.fullName}"></div>
        </div>
        <div class="col-md-6">
          <label class="app-form-label">Username</label>
          <input name="username" class="app-form-control" th:value="${username}" required>
          <div class="text-danger small" th:if="${createErrors != null and createErrors.username}" th:text="${createErrors.username}"></div>
        </div>
        <div class="col-md-6">
          <label class="app-form-label">Email</label>
          <input name="email" type="email" class="app-form-control" th:value="${email}" required>
          <div class="text-danger small" th:if="${createErrors != null and createErrors.email}" th:text="${createErrors.email}"></div>
        </div>
        <div class="col-md-3">
          <label class="app-form-label">Role</label>
          <select name="role" class="app-form-control">
            <option value="ROLE_HR" th:selected="${role == 'ROLE_HR'}">HR Manager</option>
            <option value="ROLE_INTERVIEWER" th:selected="${role == 'ROLE_INTERVIEWER'}">Interviewer</option>
          </select>
          <div class="text-danger small" th:if="${createErrors != null and createErrors.role}" th:text="${createErrors.role}"></div>
        </div>
        <div class="col-md-3">
          <label class="app-form-label">Initial password</label>
          <input name="initialPassword" type="password" class="app-form-control" required>
          <div class="text-danger small" th:if="${createErrors != null and createErrors.initialPassword}" th:text="${createErrors.initialPassword}"></div>
        </div>
        <div class="col-12"><button type="submit" class="app-btn app-btn-primary">Create Account</button></div>
      </form>
    </div>
  </div>

  <!-- Filters -->
  <form method="get" class="app-card mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-4">
        <label class="app-form-label">Search</label>
        <input name="q" class="app-form-control" th:value="${q}" placeholder="Name or email">
      </div>
      <div class="col-md-3">
        <label class="app-form-label">Role</label>
        <select name="role" class="app-form-control">
          <option value="">All</option>
          <option value="ROLE_ADMIN" th:selected="${roleFilter == 'ROLE_ADMIN'}">Admin</option>
          <option value="ROLE_HR" th:selected="${roleFilter == 'ROLE_HR'}">HR Manager</option>
          <option value="ROLE_INTERVIEWER" th:selected="${roleFilter == 'ROLE_INTERVIEWER'}">Interviewer</option>
          <option value="ROLE_CANDIDATE" th:selected="${roleFilter == 'ROLE_CANDIDATE'}">Candidate</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="app-form-label">Status</label>
        <select name="status" class="app-form-control">
          <option value="">All</option>
          <option value="ACTIVE" th:selected="${statusFilter == 'ACTIVE'}">Active</option>
          <option value="LOCKED" th:selected="${statusFilter == 'LOCKED'}">Locked</option>
          <option value="INACTIVE" th:selected="${statusFilter == 'INACTIVE'}">Inactive</option>
        </select>
      </div>
      <div class="col-md-2"><button class="app-btn app-btn-secondary w-100">Filter</button></div>
    </div>
  </form>

  <div class="app-card">
    <div th:if="${users.isEmpty()}" class="text-muted py-3">No accounts match your filters.</div>
    <div class="app-table-wrapper" th:unless="${users.isEmpty()}">
      <table class="app-table">
        <thead><tr><th>Full name</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td class="fw-semibold" th:text="${u.fullName}">Name</td>
            <td th:text="${u.username}">user</td>
            <td th:text="${u.email}">email</td>
            <td th:text="${u.role != null ? u.role.name : '—'}">role</td>
            <td>
              <span th:if="${u.status.name() == 'ACTIVE'}" class="app-badge app-badge-success">Active</span>
              <span th:if="${u.status.name() == 'LOCKED'}" class="app-badge app-badge-warning"><i class="ph-fill ph-lock me-1"></i>Locked</span>
              <span th:if="${u.status.name() == 'INACTIVE'}" class="app-badge app-badge-danger">Inactive</span>
            </td>
            <td th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'yyyy-MM-dd') : '—'}">date</td>
            <td>
              <div class="d-flex gap-1">
                <form th:if="${u.status.name() == 'LOCKED'}" th:action="@{'/admin/users/' + ${u.id} + '/unlock'}" method="post"
                      onsubmit="return confirm('Unlock this account?');">
                  <button class="app-btn app-btn-outline btn-sm">Unlock</button>
                </form>
                <form th:if="${u.status.name() == 'ACTIVE' or u.status.name() == 'LOCKED'}"
                      th:action="@{'/admin/users/' + ${u.id} + '/deactivate'}" method="post"
                      onsubmit="return confirm('Deactivate this account?');">
                  <button class="app-btn app-btn-danger btn-sm">Deactivate</button>
                </form>
                <button th:if="${u.status.name() == 'INACTIVE'}" class="app-btn app-btn-secondary btn-sm" disabled
                        title="Not available in this version">Reactivate</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
</body>
</html>
