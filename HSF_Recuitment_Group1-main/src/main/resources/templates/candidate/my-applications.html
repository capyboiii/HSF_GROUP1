<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('My Applications', ~{::section})}">
<body>
<section>
  <h1 class="mb-3">My Applications</h1>

  <div th:if="${!hasAny}" class="app-card text-center py-5">
    <p class="text-muted mb-3">You haven't applied for any positions yet.</p>
    <a th:href="@{/jobs}" class="app-btn app-btn-primary">Browse Open Positions</a>
  </div>

  <div th:if="${hasAny}">
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <a class="nav-link" th:classappend="${activeStage == 'ALL'} ? ' active fw-semibold' : ''" th:href="@{/my-applications(status='ALL')}">All</a>
      </li>
      <li class="nav-item" th:each="s : ${stages}">
        <a class="nav-link" th:classappend="${activeStage == s.name()} ? ' active fw-semibold' : ''"
           th:href="@{/my-applications(status=${s.name()})}" th:text="${#strings.capitalize(#strings.toLowerCase(s.name()))}">Stage</a>
      </li>
    </ul>

    <div class="app-card">
      <div th:if="${applications.isEmpty()}" class="text-muted py-3">No applications at this stage.</div>
      <div class="app-table-wrapper" th:unless="${applications.isEmpty()}">
        <table class="app-table">
          <thead><tr><th>Job title</th><th>Department</th><th>Submitted</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            <tr th:each="app : ${applications}">
              <td class="fw-semibold"><a th:href="@{'/jobs/' + ${app.jobPosting.id}}" th:text="${app.jobPosting.title}">Job</a></td>
              <td th:text="${app.jobPosting.department}">Dept</td>
              <td th:text="${app.submissionDate != null ? #temporals.format(app.submissionDate, 'yyyy-MM-dd') : '—'}">date</td>
              <td>
                <span class="app-badge"
                      th:classappend="${app.status.name() == 'HIRED'} ? ' app-badge-success' : (${app.status.name() == 'REJECTED'} ? ' app-badge-danger' : (${app.status.name() == 'WITHDRAWN'} ? ' app-badge-secondary' : ' app-badge-info'))"
                      th:text="${app.status}">STATUS</span>
              </td>
              <td>
                <form th:if="${app.status.name() == 'APPLIED' or app.status.name() == 'SCREENING'}"
                      th:action="@{'/my-applications/' + ${app.id} + '/withdraw'}" method="post"
                      onsubmit="return confirm('Withdraw this application?');">
                  <button class="app-btn app-btn-outline btn-sm">Withdraw</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
</body>
</html>
