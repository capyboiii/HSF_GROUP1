<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/app :: appLayout('Change Password', ~{::section})}">
<body>
<section>
  <h1 class="mb-4">Change Password</h1>
  <div class="app-card" style="max-width: 520px;">
    <form th:action="@{/change-password}" method="post">
      <div class="mb-3">
        <label class="app-form-label">Current password</label>
        <input type="password" name="currentPassword" class="app-form-control" required>
        <div class="text-danger small" th:if="${errors != null and errors.currentPassword}" th:text="${errors.currentPassword}"></div>
      </div>
      <div class="mb-3">
        <label class="app-form-label">New password</label>
        <input type="password" name="newPassword" class="app-form-control" required>
        <small class="text-muted">At least 8 characters, including 1 uppercase letter and 1 number.</small>
        <div class="text-danger small" th:if="${errors != null and errors.newPassword}" th:text="${errors.newPassword}"></div>
      </div>
      <div class="mb-4">
        <label class="app-form-label">Confirm new password</label>
        <input type="password" name="confirmPassword" class="app-form-control" required>
        <div class="text-danger small" th:if="${errors != null and errors.confirmPassword}" th:text="${errors.confirmPassword}"></div>
      </div>
      <div class="d-flex gap-2 border-top pt-3">
        <button type="submit" class="app-btn app-btn-primary">Change Password</button>
        <a th:href="@{/profile}" class="app-btn app-btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</section>
</body>
</html>
