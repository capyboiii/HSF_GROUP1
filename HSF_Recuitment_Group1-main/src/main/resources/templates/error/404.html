<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: mainLayout(title='Page Not Found - 404', content=~{::section})}">
<body>
<section>
  <div class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height: 60vh;">
    <!-- Icon representing missing/not found -->
    <div class="bg-warning-soft text-warning rounded-circle p-4 mb-4 d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px; background-color: #FEF3C7;">
      <i class="ph-bold ph-warning" style="font-size: 40px; color: var(--warning);"></i>
    </div>
    
    <h1 class="display-5 fw-bold mb-3">Page Not Found (404)</h1>
    <p class="text-muted mb-4" style="max-width: 500px; font-size: var(--body-size);">
      We couldn't find the page you're looking for. It might have been moved, deleted, or the URL might be incorrect.
    </p>

    <div class="d-flex gap-3">
      <a th:href="@{/}" class="app-btn app-btn-primary">
        <i class="ph-bold ph-house me-2"></i>Go to Dashboard
      </a>
    </div>
  </div>
</section>
</body>
</html>
