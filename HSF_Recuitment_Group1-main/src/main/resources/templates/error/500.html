<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: mainLayout(title='System Error - 500', content=~{::section})}">
<body>
<section>
  <div class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height: 60vh;">
    <!-- Icon representing system crash -->
    <div class="bg-danger-soft text-danger rounded-circle p-4 mb-4 d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px; background-color: #FEE2E2;">
      <i class="ph-bold ph-gear-six" style="font-size: 40px; color: var(--danger);"></i>
    </div>
    
    <h1 class="display-5 fw-bold mb-3">System Error (500)</h1>
    <p class="text-muted mb-4" style="max-width: 500px; font-size: var(--body-size);">
      Something went wrong on our server. We are working on fixing it. Please try again later.
    </p>

    <div class="d-flex gap-3">
      <a th:href="@{/}" class="app-btn app-btn-primary">
        <i class="ph-bold ph-house me-2"></i>Go to Dashboard
      </a>
    </div>
  </div>
</section>
</body>
</html>
